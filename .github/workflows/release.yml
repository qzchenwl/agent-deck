name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build agent-deck for PATH-sensitive tests
        run: |
          mkdir -p "$RUNNER_TEMP/agent-deck-bin"
          go build -o "$RUNNER_TEMP/agent-deck-bin/agent-deck" ./cmd/agent-deck
          echo "$RUNNER_TEMP/agent-deck-bin" >> "$GITHUB_PATH"

      - name: Run tests
        shell: bash
        run: |
          packages=($(go list ./... | grep -Ev '^github.com/asheshgoplani/agent-deck/internal/(integration|mcppool|session|tmux)$'))
          go test -race "${packages[@]}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
