name: Auto-release cwl-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-cwl
  cancel-in-progress: false

jobs:
  release-cwl:
    if: github.repository == 'qzchenwl/agent-deck'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cwl-main
        uses: actions/checkout@v4
        with:
          ref: cwl-main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main and create cwl release tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main cwl-main --tags
          git checkout -B cwl-main origin/cwl-main

          if git merge-base --is-ancestor origin/main origin/cwl-main; then
            echo "cwl-main already contains the latest main; skipping release."
            exit 0
          fi

          if ! git merge -X ours --no-edit origin/main; then
            git merge --abort || true
            echo "Automatic merge from main into cwl-main failed."
            exit 1
          fi

          upstream_version=$(git show origin/main:cmd/agent-deck/main.go | sed -n 's/^const Version = "\(.*\)"/\1/p')
          if [[ -z "${upstream_version}" ]]; then
            echo "Failed to detect upstream version from cmd/agent-deck/main.go"
            exit 1
          fi

          latest_suffix=$(git tag -l "v${upstream_version}-cwl.*" | sed -n "s/^v${upstream_version}-cwl\\.//p" | sort -n | tail -1)
          if [[ -z "${latest_suffix}" ]]; then
            next_suffix=1
          else
            next_suffix=$((latest_suffix + 1))
          fi

          next_version="${upstream_version}-cwl.${next_suffix}"
          next_tag="v${next_version}"

          perl -0pi -e "s/const Version = \".*?\"/const Version = \"${next_version}\"/" cmd/agent-deck/main.go

          if ! git diff --quiet; then
            git add cmd/agent-deck/main.go
            git commit -m "chore: release ${next_version}"
          fi

          git push origin cwl-main

          if git rev-parse "${next_tag}" >/dev/null 2>&1; then
            echo "Tag ${next_tag} already exists; skipping."
            exit 0
          fi

          git tag -a "${next_tag}" -m "${next_tag}"
          git push origin "${next_tag}"
